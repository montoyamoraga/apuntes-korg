name: build and deploy PDFs to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: compile PDFs
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            en/en.tex
            es/es.tex

      - name: prepare site
        run: |
          mkdir site
          cp en.pdf site/en.pdf
          cp es.pdf site/es.pdf

          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>PDF Viewer</title>
            <style>
              body { font-family: sans-serif; margin: 0; }
              header { padding: 1rem; background: #111; color: white; }
              iframe { width: 100%; height: 90vh; border: none; }
              .buttons { padding: 1rem; }
              button { margin-right: 1rem; padding: 0.5rem 1rem; }
            </style>
          </head>
          <body>
            <header>
              <h2>Latest PDFs</h2>
            </header>
            <div class="buttons">
              <button onclick="loadPDF('en.pdf')">English</button>
              <button onclick="loadPDF('es.pdf')">Español</button>
              <a href="en.pdf" download>⬇ EN</a>
              <a href="es.pdf" download>⬇ ES</a>
            </div>
            <iframe id="viewer" src="en.pdf"></iframe>

            <script>
              function loadPDF(file) {
                document.getElementById('viewer').src = file;
              }
            </script>
          </body>
          </html>
          EOF

      - name: upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: deploy to GitHub Pages
        uses: actions/deploy-pages@v4